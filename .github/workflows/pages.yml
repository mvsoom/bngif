name: Deploy pages repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5

      - name: Build deploy tree
        run: |
          mkdir site
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'site/' \
            ./ site/
          touch site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
